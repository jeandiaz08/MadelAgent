version: '3.9'

services:
  db:
    image: postgres:15
    container_name: madel_postgres
    restart: always
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: madel_app
    depends_on:
      - db
    ports:
      - "8501:8501"
    volumes:
      - ..:/app
    env_file:
      - ../.env

volumes:
  postgres_data:
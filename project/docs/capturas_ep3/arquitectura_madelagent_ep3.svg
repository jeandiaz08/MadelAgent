<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050">
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#111827"/>
    </marker>
    <marker id="dashArrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#0f8fa8"/>
    </marker>
    <style>
      .title { font: 700 36px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #4b5563; }
      .box-title { font: 700 18px Arial, sans-serif; fill: #111827; }
      .small-title { font: 700 15px Arial, sans-serif; fill: #111827; }
      .text { font: 400 15px Arial, sans-serif; fill: #1f2937; }
      .tiny { font: 400 13px Arial, sans-serif; fill: #374151; }
      .badge { font: 700 12px Arial, sans-serif; fill: #374151; }
      .flow { stroke: #111827; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .support { stroke: #7c3aed; stroke-width: 2.5; stroke-dasharray: 9 7; fill: none; marker-end: url(#arrow); }
      .infra { stroke: #0f8fa8; stroke-width: 2.5; stroke-dasharray: 9 7; fill: none; marker-end: url(#dashArrow); }
      .user { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; }
      .ui { fill: #f0fdf4; stroke: #22c55e; stroke-width: 2; }
      .agent { fill: #f5f3ff; stroke: #8b5cf6; stroke-width: 2.5; }
      .guard { fill: #fff7ed; stroke: #f59e0b; stroke-width: 2; }
      .db { fill: #fff1f2; stroke: #ef4444; stroke-width: 2; }
      .proc { fill: #eff6ff; stroke: #60a5fa; stroke-width: 2; }
      .obs { fill: #ecfeff; stroke: #06b6d4; stroke-width: 2; }
      .ans { fill: #f0fdf4; stroke: #22c55e; stroke-width: 2; }
      .infra-box { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; }
      .legend { fill: #ffffff; stroke: #d1d5db; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1600" height="1050" fill="#ffffff"/>
  <text x="800" y="58" text-anchor="middle" class="title">Arquitectura actual del sistema - MadelAgent EP3</text>
  <text x="800" y="88" text-anchor="middle" class="subtitle">Agente Text-to-SQL con memoria, seguridad, feedback persistente y observabilidad en LangSmith</text>

  <!-- Main flow top row -->
  <rect x="45" y="150" width="175" height="190" rx="12" class="user"/>
  <text x="132" y="182" text-anchor="middle" class="box-title">1. Usuario</text>
  <circle cx="132" cy="228" r="27" fill="#2563eb"/>
  <path d="M92 298 C100 262, 164 262, 172 298 L172 314 L92 314 Z" fill="#2563eb"/>
  <text x="132" y="338" text-anchor="middle" class="tiny">Pregunta en</text>
  <text x="132" y="356" text-anchor="middle" class="tiny">lenguaje natural</text>

  <rect x="275" y="150" width="225" height="190" rx="12" class="ui"/>
  <text x="388" y="182" text-anchor="middle" class="box-title">2. Streamlit</text>
  <text x="312" y="225" class="text">• Chat de gestion</text>
  <text x="312" y="255" class="text">• Reporte de calidad</text>
  <text x="312" y="285" class="text">• Observabilidad local</text>
  <text x="312" y="315" class="text">• Feedback del usuario</text>

  <rect x="560" y="122" width="560" height="245" rx="14" class="agent"/>
  <text x="840" y="155" text-anchor="middle" class="box-title">3. Agente inteligente con LangGraph + Groq</text>
  <rect x="590" y="190" width="118" height="126" rx="8" fill="#ffffff" stroke="#c4b5fd" stroke-width="2"/>
  <text x="649" y="217" text-anchor="middle" class="small-title">3.1 Memoria</text>
  <text x="610" y="250" class="tiny">Historial</text>
  <text x="610" y="272" class="tiny">Contexto</text>
  <text x="610" y="294" class="tiny">Sesion</text>

  <rect x="728" y="190" width="118" height="126" rx="8" fill="#ffffff" stroke="#c4b5fd" stroke-width="2"/>
  <text x="787" y="217" text-anchor="middle" class="small-title">3.2 Planner</text>
  <text x="748" y="250" class="tiny">Intencion</text>
  <text x="748" y="272" class="tiny">KPI / datos</text>
  <text x="748" y="294" class="tiny">Siguiente paso</text>

  <rect x="866" y="190" width="118" height="126" rx="8" fill="#ffffff" stroke="#c4b5fd" stroke-width="2"/>
  <text x="925" y="217" text-anchor="middle" class="small-title">3.3 Tools</text>
  <text x="886" y="250" class="tiny">get_schema</text>
  <text x="886" y="272" class="tiny">readonly SQL</text>
  <text x="886" y="294" class="tiny">usage/cost</text>

  <rect x="1004" y="190" width="88" height="126" rx="8" fill="#ffffff" stroke="#c4b5fd" stroke-width="2"/>
  <text x="1048" y="217" text-anchor="middle" class="small-title">3.4 LLM</text>
  <text x="1022" y="250" class="tiny">Groq</text>
  <text x="1022" y="272" class="tiny">Llama</text>
  <text x="1022" y="294" class="tiny">SQL</text>

  <rect x="1190" y="150" width="255" height="190" rx="12" class="guard"/>
  <text x="1318" y="182" text-anchor="middle" class="box-title">4. Validacion y seguridad</text>
  <text x="1222" y="225" class="text">• Solo SELECT</text>
  <text x="1222" y="255" class="text">• Bloqueo escritura</text>
  <text x="1222" y="285" class="text">• Filtro datos sensibles</text>
  <text x="1222" y="315" class="text">• Manejo de errores</text>

  <!-- Middle row -->
  <rect x="1190" y="430" width="255" height="190" rx="12" class="db"/>
  <text x="1318" y="462" text-anchor="middle" class="box-title">5. PostgreSQL local</text>
  <text x="1222" y="505" class="text">• ventas / pedidos</text>
  <text x="1222" y="535" class="text">• inventario / productos</text>
  <text x="1222" y="565" class="text">• historial y feedback</text>
  <text x="1222" y="595" class="text">• llm_usage / costos</text>

  <rect x="790" y="430" width="270" height="190" rx="12" class="proc"/>
  <text x="925" y="462" text-anchor="middle" class="box-title">6. Procesamiento</text>
  <text x="825" y="505" class="text">• Resultados tabulares</text>
  <text x="825" y="535" class="text">• Analisis de KPIs</text>
  <text x="825" y="565" class="text">• Recomendaciones</text>
  <text x="825" y="595" class="text">• Resumen empresarial</text>

  <rect x="440" y="430" width="270" height="190" rx="12" class="ans"/>
  <text x="575" y="462" text-anchor="middle" class="box-title">7. Respuesta final</text>
  <text x="475" y="505" class="text">• Lenguaje natural</text>
  <text x="475" y="535" class="text">• Contexto de negocio</text>
  <text x="475" y="565" class="text">• Explicacion breve</text>
  <text x="475" y="595" class="text">• Accion sugerida</text>

  <rect x="45" y="430" width="245" height="190" rx="12" class="user"/>
  <text x="168" y="462" text-anchor="middle" class="box-title">8. Usuario</text>
  <text x="80" y="505" class="text">Recibe respuesta</text>
  <text x="80" y="535" class="text">califica utilidad</text>
  <text x="80" y="565" class="text">y continua el flujo</text>

  <!-- Observability row -->
  <rect x="365" y="715" width="870" height="175" rx="14" class="obs"/>
  <text x="800" y="748" text-anchor="middle" class="box-title">9. Observabilidad, trazabilidad y evidencia de calidad</text>
  <rect x="398" y="775" width="180" height="78" rx="8" fill="#ffffff" stroke="#67e8f9" stroke-width="2"/>
  <text x="488" y="803" text-anchor="middle" class="small-title">Streamlit</text>
  <text x="420" y="831" class="tiny">Dashboard local</text>
  <rect x="610" y="775" width="180" height="78" rx="8" fill="#ffffff" stroke="#67e8f9" stroke-width="2"/>
  <text x="700" y="803" text-anchor="middle" class="small-title">PostgreSQL</text>
  <text x="637" y="831" class="tiny">feedback + usage</text>
  <rect x="822" y="775" width="180" height="78" rx="8" fill="#ffffff" stroke="#67e8f9" stroke-width="2"/>
  <text x="912" y="803" text-anchor="middle" class="small-title">LangSmith</text>
  <text x="854" y="831" class="tiny">traces + latencia</text>
  <rect x="1034" y="775" width="168" height="78" rx="8" fill="#ffffff" stroke="#67e8f9" stroke-width="2"/>
  <text x="1118" y="803" text-anchor="middle" class="small-title">Metricas</text>
  <text x="1060" y="831" class="tiny">tokens / errores</text>

  <rect x="330" y="935" width="940" height="70" rx="12" class="infra-box"/>
  <text x="800" y="964" text-anchor="middle" class="box-title">10. Infraestructura Docker</text>
  <text x="380" y="990" class="text">Contenedor App: Streamlit + backend Python + agente</text>
  <text x="850" y="990" class="text">Contenedor PostgreSQL: base relacional + volumen</text>

  <!-- Arrows main -->
  <path class="flow" d="M220 245 L275 245"/>
  <path class="flow" d="M500 245 L560 245"/>
  <path class="flow" d="M1120 245 L1190 245"/>
  <path class="flow" d="M1318 340 L1318 430"/>
  <path class="flow" d="M1190 525 L1060 525"/>
  <path class="flow" d="M790 525 L710 525"/>
  <path class="flow" d="M440 525 L290 525"/>
  <path class="flow" d="M168 430 C110 385, 35 335, 45 245"/>

  <!-- Agent internal arrows -->
  <path class="support" d="M708 253 L728 253"/>
  <path class="support" d="M846 253 L866 253"/>
  <path class="support" d="M984 253 L1004 253"/>

  <!-- Observability arrows -->
  <path class="infra" d="M575 620 L575 715"/>
  <path class="infra" d="M925 620 L925 715"/>
  <path class="infra" d="M1318 620 C1318 700, 1160 730, 1118 775"/>
  <path class="infra" d="M575 715 C510 650, 430 620, 290 560"/>
  <path class="infra" d="M800 890 L800 935"/>
  <path class="infra" d="M1318 620 C1325 760, 1200 900, 1100 935"/>

  <!-- Security note -->
  <rect x="1190" y="655" width="255" height="84" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="1318" y="682" text-anchor="middle" class="small-title">Politica sensible</text>
  <text x="1216" y="711" class="tiny">Detalle de empleados/turnos:</text>
  <text x="1216" y="731" class="tiny">bloqueado o agregado por rol</text>

  <!-- Legend -->
  <rect x="1288" y="790" width="230" height="160" rx="10" class="legend"/>
  <text x="1403" y="823" text-anchor="middle" class="box-title">Leyenda</text>
  <path class="flow" d="M1320 855 L1380 855"/>
  <text x="1395" y="860" class="tiny">Flujo principal</text>
  <path class="support" d="M1320 890 L1380 890"/>
  <text x="1395" y="895" class="tiny">Apoyo del agente</text>
  <path class="infra" d="M1320 925 L1380 925"/>
  <text x="1395" y="930" class="tiny">Infraestructura / logs</text>
</svg>
